# This workflow will build a .NET project  
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Allow legacy SSL renegotiation
      run: echo 'openssl_conf = default_conf' >> ~/.openssl.cnf && echo '[default_conf]' >> ~/.openssl.cnf && echo 'ssl_conf = ssl_sect' >> ~/.openssl.cnf && echo '[ssl_sect]' >> ~/.openssl.cnf && echo 'system_default = crypto_policy' >> ~/.openssl.cnf && export OPENSSL_CONF=~/.openssl.cnf
    - name: Restore dependencies
      run: dotnet restore --configfile nuget.config
    - name: Publish
      run: dotnet publish -c Release -o publish
    - name: Deploy via SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        rsync -avz -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" publish/ github-deploy@172.205.192.35:/var/www/myapp/

    - name: List published files
      run: ls -R publish
